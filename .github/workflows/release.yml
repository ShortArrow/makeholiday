# SHA-pinned per ADR-014.
# To verify a pin: gh api repos/<owner>/<repo>/git/ref/tags/<version> --jq .object.sha
# Tag comments are advisory only; the SHA is the source of truth.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Test
        run: cargo test --workspace --locked

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            binary: makeholiday.exe
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            binary: makeholiday
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            binary: makeholiday
            linker: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            binary: makeholiday
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            binary: makeholiday
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install cross linker
        if: matrix.apt_packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt_packages }}
      - name: Configure cargo for cross target
        if: matrix.linker
        run: |
          mkdir -p .cargo
          {
            echo "[target.${{ matrix.target }}]"
            echo "linker = \"${{ matrix.linker }}\""
          } >> .cargo/config.toml
      - name: Build release
        run: cargo build --release --locked -p makeholiday --target ${{ matrix.target }}
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          name="makeholiday-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${name}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          echo "ARTIFACT_PATH=dist/${name}.tar.gz" >> "$GITHUB_ENV"
      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "makeholiday-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/$name/"
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE "dist/$name/"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          "ARTIFACT_PATH=dist/$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Attest provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ARTIFACT_PATH }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: makeholiday-${{ matrix.target }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*
