# One-shot workflow to publish 0.0.0 placeholders of the four
# ecosystem crates (`ics-core`, `icscli`, `icslint`, `lazyics`) to
# crates.io via OIDC Trusted Publishing. Mirrors the pattern used by
# runex's release.yml — no long-lived CARGO_REGISTRY_TOKEN, every run
# exchanges a short-lived GitHub OIDC token for a short-lived
# crates.io token via `rust-lang/crates-io-auth-action`.
#
# Trigger: workflow_dispatch only. Run once after Trusted Publisher
# registrations are in place on crates.io for each of the four crates.
# Re-runs are safe — already-published versions are skipped.
#
# Setup required (once, in crates.io web UI) for each crate:
#   Repository: ShortArrow/makeholiday
#   Workflow filename: reserve-names.yml
#   Environment: (leave blank)
#
# See ADR-017 / ADR-025 / ADR-026 for the public roadmap that
# justifies the name reservation under crates.io's "intent to publish"
# policy.

name: Reserve crate names on crates.io

on:
  workflow_dispatch:

concurrency:
  group: reserve-names
  cancel-in-progress: false

jobs:
  publish:
    name: Publish placeholders (OIDC)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable pinned 2026-04

      - name: Exchange OIDC token for crates.io token
        id: auth
        uses: rust-lang/crates-io-auth-action@v1.0.4

      - name: Publish ics-core
        # ics-core publishes first because icslint depends on it.
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          status=$(curl -fsS -A "makeholiday-ci" -o /dev/null -w '%{http_code}' \
            "https://crates.io/api/v1/crates/ics-core/0.0.0" || echo "000")
          if [ "$status" = "200" ]; then
            echo "ics-core 0.0.0 already on crates.io — skipping"
          else
            cargo publish -p ics-core
          fi

      - name: Wait for ics-core index propagation
        # crates.io's sparse index needs a moment before icslint's
        # dependency on ics-core 0.0.0 can resolve. 30 s is the
        # conservative figure used by the rust-lang/crates-io docs.
        run: sleep 30

      - name: Publish icslint
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          status=$(curl -fsS -A "makeholiday-ci" -o /dev/null -w '%{http_code}' \
            "https://crates.io/api/v1/crates/icslint/0.0.0" || echo "000")
          if [ "$status" = "200" ]; then
            echo "icslint 0.0.0 already on crates.io — skipping"
          else
            cargo publish -p icslint
          fi

      - name: Publish icscli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          status=$(curl -fsS -A "makeholiday-ci" -o /dev/null -w '%{http_code}' \
            "https://crates.io/api/v1/crates/icscli/0.0.0" || echo "000")
          if [ "$status" = "200" ]; then
            echo "icscli 0.0.0 already on crates.io — skipping"
          else
            cargo publish -p icscli
          fi

      - name: Publish lazyics
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          status=$(curl -fsS -A "makeholiday-ci" -o /dev/null -w '%{http_code}' \
            "https://crates.io/api/v1/crates/lazyics/0.0.0" || echo "000")
          if [ "$status" = "200" ]; then
            echo "lazyics 0.0.0 already on crates.io — skipping"
          else
            cargo publish -p lazyics
          fi
